services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: finflow
      POSTGRES_PASSWORD: finflow_dev
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finflow -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  accounts-service:
    build: ./services/accounts-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://finflow:finflow_dev@postgres:5432/accounts_db
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  transactions-service:
    build: ./services/transactions-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://finflow:finflow_dev@postgres:5432/transactions_db
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy

  loans-service:
    build: ./services/loans-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://finflow:finflow_dev@postgres:5432/loans_db
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy

  bff:
    build: ./apps/bff
    ports:
      - "4000:4000"
    environment:
      ACCOUNTS_SERVICE_URL: http://accounts-service:3001
      TRANSACTIONS_SERVICE_URL: http://transactions-service:3002
      LOANS_SERVICE_URL: http://loans-service:3003
      JWT_SECRET: local_dev_secret_change_in_prod
      PORT: 4000
    depends_on:
      - accounts-service
      - transactions-service
      - loans-service

volumes:
  postgres_data:
