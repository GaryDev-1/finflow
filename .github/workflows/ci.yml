name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finflow
          POSTGRES_PASSWORD: finflow_dev
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: md5
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finflow -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # Shared across all steps
      ACCOUNTS_DATABASE_URL: postgresql://finflow:finflow_dev@localhost:5432/accounts_db
      TRANSACTIONS_DATABASE_URL: postgresql://finflow:finflow_dev@localhost:5432/transactions_db
      LOANS_DATABASE_URL: postgresql://finflow:finflow_dev@localhost:5432/loans_db
      ACCOUNTS_SERVICE_URL: http://localhost:3001
      TRANSACTIONS_SERVICE_URL: http://localhost:3002
      LOANS_SERVICE_URL: http://localhost:3003
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      JWT_EXPIRY: 8h
      NEXT_PUBLIC_BFF_URL: http://localhost:4000/graphql

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create databases
        run: |
          PGPASSWORD=finflow_dev psql -h localhost -U finflow -d postgres -c "CREATE DATABASE accounts_db;"
          PGPASSWORD=finflow_dev psql -h localhost -U finflow -d postgres -c "CREATE DATABASE transactions_db;"
          PGPASSWORD=finflow_dev psql -h localhost -U finflow -d postgres -c "CREATE DATABASE loans_db;"

      - name: Run migrations
        run: |
          npm run migrate --workspace=@finflow/accounts-service
          npm run migrate --workspace=@finflow/transactions-service
          npm run migrate --workspace=@finflow/loans-service

      - name: Run tests (all workspaces)
        run: npm run test --workspaces --if-present

      - name: Build (all workspaces)
        run: npm run build --workspaces --if-present
